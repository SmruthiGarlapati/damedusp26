<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 500" width="700" height="500" font-family="ui-monospace, 'Courier New', monospace">

  <!-- Background -->
  <rect width="700" height="500" fill="#ffffff"/>

  <!-- Header -->
  <rect x="0" y="0" width="700" height="56" fill="#1e293b"/>
  <text x="20" y="22" font-size="10" fill="#94a3b8" font-weight="700" letter-spacing="1">CS 314 · TA OFFICE · FALL 2024</text>
  <text x="20" y="42" font-size="18" fill="#f8fafc" font-weight="700">Pointer Arithmetic Cheatsheet</text>

  <!-- Section 1: Pointer Basics -->
  <text x="20" y="82" font-size="12" fill="#1d4ed8" font-weight="700">1. POINTER BASICS</text>
  <rect x="20" y="88" width="320" height="110" rx="6" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="32" y="108" font-size="11" fill="#1e293b">int x = 42;</text>
  <text x="32" y="124" font-size="11" fill="#1e293b">int* p = &amp;x;         // p stores address of x</text>
  <text x="32" y="140" font-size="11" fill="#1e293b">*p = 99;             // dereference: x is now 99</text>
  <text x="32" y="156" font-size="11" fill="#1e293b">int** pp = &amp;p;       // pointer to pointer</text>
  <text x="32" y="172" font-size="11" fill="#1e293b">**pp = 7;            // x is now 7</text>
  <text x="32" y="188" font-size="11" fill="#94a3b8">// sizeof(int*) == 8 bytes on 64-bit</text>

  <!-- Section 2: Array / Pointer Equivalence -->
  <text x="360" y="82" font-size="12" fill="#15803d" font-weight="700">2. ARRAY ↔ POINTER</text>
  <rect x="360" y="88" width="320" height="110" rx="6" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
  <text x="372" y="108" font-size="11" fill="#1e293b">int arr[] = {10, 20, 30, 40};</text>
  <text x="372" y="124" font-size="11" fill="#1e293b">int* p = arr;        // arr decays to &amp;arr[0]</text>
  <text x="372" y="140" font-size="11" fill="#1e293b">*(p + 2) == arr[2]  // both == 30  ✓</text>
  <text x="372" y="156" font-size="11" fill="#1e293b">p++;                 // p now points to arr[1]</text>
  <text x="372" y="172" font-size="11" fill="#1e293b">p + n  →  advances by n * sizeof(int)</text>
  <text x="372" y="188" font-size="11" fill="#94a3b8">// pointer diff: (p2 - p1) = # elements apart</text>

  <!-- Memory diagram -->
  <text x="20" y="222" font-size="12" fill="#7c3aed" font-weight="700">3. MEMORY LAYOUT — int arr[4]</text>
  <!-- boxes -->
  <rect x="20" y="232" width="70" height="36" rx="4" fill="#f5f3ff" stroke="#ddd6fe" stroke-width="1.5"/>
  <text x="55" y="248" font-size="13" text-anchor="middle" fill="#6d28d9" font-weight="700">10</text>
  <text x="55" y="263" font-size="9" text-anchor="middle" fill="#94a3b8">0x1000</text>

  <rect x="100" y="232" width="70" height="36" rx="4" fill="#f5f3ff" stroke="#ddd6fe" stroke-width="1.5"/>
  <text x="135" y="248" font-size="13" text-anchor="middle" fill="#6d28d9" font-weight="700">20</text>
  <text x="135" y="263" font-size="9" text-anchor="middle" fill="#94a3b8">0x1004</text>

  <rect x="180" y="232" width="70" height="36" rx="4" fill="#f5f3ff" stroke="#ddd6fe" stroke-width="1.5"/>
  <text x="215" y="248" font-size="13" text-anchor="middle" fill="#6d28d9" font-weight="700">30</text>
  <text x="215" y="263" font-size="9" text-anchor="middle" fill="#94a3b8">0x1008</text>

  <rect x="260" y="232" width="70" height="36" rx="4" fill="#f5f3ff" stroke="#ddd6fe" stroke-width="1.5"/>
  <text x="295" y="248" font-size="13" text-anchor="middle" fill="#6d28d9" font-weight="700">40</text>
  <text x="295" y="263" font-size="9" text-anchor="middle" fill="#94a3b8">0x100C</text>

  <text x="20" y="285" font-size="11" fill="#64748b">arr[0]     arr[1]     arr[2]     arr[3]</text>
  <text x="20" y="300" font-size="11" fill="#64748b">p+0        p+1        p+2        p+3     (each +4 bytes for int)</text>

  <!-- Section 4: Common mistakes -->
  <text x="360" y="222" font-size="12" fill="#dc2626" font-weight="700">4. COMMON BUGS</text>
  <rect x="360" y="232" width="320" height="130" rx="6" fill="#fef2f2" stroke="#fecaca" stroke-width="1"/>
  <text x="372" y="252" font-size="11" fill="#dc2626" font-weight="700">① Dangling pointer</text>
  <text x="372" y="268" font-size="11" fill="#1e293b">int* p = new int(5);</text>
  <text x="372" y="284" font-size="11" fill="#1e293b">delete p;</text>
  <text x="372" y="300" font-size="11" fill="#dc2626">*p = 10;  // UNDEFINED — p is dangling</text>
  <text x="372" y="320" font-size="11" fill="#dc2626" font-weight="700">② Out of bounds</text>
  <text x="372" y="336" font-size="11" fill="#1e293b">int a[3]; a[3] = 9;  // UNDEFINED</text>
  <text x="372" y="352" font-size="11" fill="#94a3b8">// valid indices: 0, 1, 2 only</text>

  <!-- Section 5: new / delete -->
  <text x="20" y="334" font-size="12" fill="#0891b2" font-weight="700">5. new / delete</text>
  <rect x="20" y="340" width="320" height="110" rx="6" fill="#ecfeff" stroke="#a5f3fc" stroke-width="1"/>
  <text x="32" y="360" font-size="11" fill="#1e293b">int* p  = new int(42);      // single</text>
  <text x="32" y="376" font-size="11" fill="#1e293b">int* arr = new int[10];     // array</text>
  <text x="32" y="392" font-size="11" fill="#1e293b">delete p;                   // free single</text>
  <text x="32" y="408" font-size="11" fill="#1e293b">delete[] arr;               // free array ← []!</text>
  <text x="32" y="428" font-size="11" fill="#0891b2" font-weight="700">Rule: new[]  must pair with  delete[]</text>
  <text x="32" y="444" font-size="11" fill="#94a3b8">Mixing them is undefined behavior.</text>

  <!-- Section 6: Quick ref -->
  <text x="360" y="390" font-size="12" fill="#1e293b" font-weight="700">6. QUICK REFERENCE</text>
  <rect x="360" y="396" width="320" height="88" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="372" y="414" font-size="11" fill="#1e293b">&amp;x       → address of x</text>
  <text x="372" y="430" font-size="11" fill="#1e293b">*p       → value at address p</text>
  <text x="372" y="446" font-size="11" fill="#1e293b">p-&gt;field → (*p).field  (struct/object)</text>
  <text x="372" y="462" font-size="11" fill="#1e293b">nullptr  → null pointer (C++11+)</text>
  <text x="372" y="478" font-size="11" fill="#94a3b8">Always initialize pointers before use!</text>

</svg>
